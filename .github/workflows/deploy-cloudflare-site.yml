name: Deploy Cloudflare site

on:
  workflow_dispatch:
    inputs:
      site:
        description: Site folder (from sites.registry.json)
        required: true
        default: project
        type: choice
        options:
          - flooringboxcalculator
          - metaboliclowcarb
          - project
          - paintcalculator
          - mulchcalculator
          - drywallcalculator
      attach_domain:
        description: Link custom domain via Cloudflare API
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'flooringboxcalculator/**'
      - 'metaboliclowcarb/**'
      - 'project/**'
      - 'paintcalculator/**'
      - 'mulchcalculator/**'
      - 'drywallcalculator/**'
      - 'sites.registry.json'
      - 'scripts/deploy-cloudflare.mjs'
      - 'scripts/setup-cloudflare-domain.mjs'
      - 'scripts/detect-changed-sites.mjs'
      - 'scripts/lib/**'
      - '.github/workflows/deploy-cloudflare-site.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  deploy-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root wrangler
        run: npm ci

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub secrets CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID."
            echo "Add them at: Settings → Secrets and variables → Actions"
            echo "Account ID: e30350dfd5bf9e1a9ca03dc4fdf3b247 (see .env.example)"
            exit 1
          fi

      - name: Deploy changed sites
        env:
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_ADSENSE_CLIENT: ${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT_FOOTER: ${{ secrets.VITE_ADSENSE_SLOT_FOOTER }}
          VITE_ADSENSE_SLOT_CONTENT: ${{ secrets.VITE_ADSENSE_SLOT_CONTENT }}
        run: |
          mapfile -t sites < <(node scripts/detect-changed-sites.mjs)
          if [ ${#sites[@]} -eq 0 ]; then
            echo "No site folders changed; skipping deploy."
            git diff --name-only HEAD~1 HEAD || true
            exit 0
          fi
          echo "Deploying: ${sites[*]}"
          for site in "${sites[@]}"; do
            node scripts/deploy-cloudflare.mjs "$site"
          done

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root wrangler
        run: npm ci

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub secrets CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID."
            echo "Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Deploy site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_ADSENSE_CLIENT: ${{ secrets.VITE_ADSENSE_CLIENT }}
          VITE_ADSENSE_SLOT_FOOTER: ${{ secrets.VITE_ADSENSE_SLOT_FOOTER }}
          VITE_ADSENSE_SLOT_CONTENT: ${{ secrets.VITE_ADSENSE_SLOT_CONTENT }}
        run: |
          if [ "${{ github.event.inputs.attach_domain }}" = "true" ]; then
            node scripts/deploy-cloudflare.mjs "${{ github.event.inputs.site }}" --attach-domain
          else
            node scripts/deploy-cloudflare.mjs "${{ github.event.inputs.site }}"
          fi
