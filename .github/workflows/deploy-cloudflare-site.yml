name: Deploy Cloudflare site

on:
  workflow_dispatch:
    inputs:
      site:
        description: Site folder (from sites.registry.json)
        required: true
        default: project
        type: choice
        options:
          - flooringboxcalculator
          - metaboliclowcarb
          - project
          - paintcalculator
          - mulchcalculator
          - drywallcalculator
      attach_domain:
        description: Link custom domain via Cloudflare API
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'flooringboxcalculator/**'
      - 'metaboliclowcarb/**'
      - 'project/**'
      - 'paintcalculator/**'
      - 'mulchcalculator/**'
      - 'drywallcalculator/**'
      - 'sites.registry.json'
      - 'scripts/deploy-cloudflare.mjs'
      - 'scripts/setup-cloudflare-domain.mjs'
      - 'scripts/detect-changed-sites.mjs'
      - 'scripts/lib/**'

jobs:
  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.set.outputs.sites }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed sites
        id: set
        env:
          GITHUB_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          SITES=$(node scripts/detect-changed-sites.mjs | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "sites=${SITES:-[]}" >> "$GITHUB_OUTPUT"
          echo "Deploying: ${SITES:-[]}"

  deploy-push:
    if: github.event_name == 'push' && needs.detect.outputs.sites != '[]'
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root wrangler
        run: npm ci

      - name: Deploy site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/deploy-cloudflare.mjs "${{ matrix.site }}"

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root wrangler
        run: npm ci

      - name: Deploy site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.event.inputs.attach_domain }}" = "true" ]; then
            node scripts/deploy-cloudflare.mjs "${{ github.event.inputs.site }}" --attach-domain
          else
            node scripts/deploy-cloudflare.mjs "${{ github.event.inputs.site }}"
          fi
