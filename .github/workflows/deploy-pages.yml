# Deprecated — satoshi-calc.com now deploys via Cloudflare Pages.
# Use: npm run deploy -- project --attach-domain
# Or GitHub Actions workflow: "Deploy Cloudflare site" → project

name: Deploy to GitHub Pages (deprecated)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Stop — use Cloudflare deploy instead
        run: |
          echo "satoshi-calc.com is deployed to Cloudflare Pages."
          echo "Run: npm run deploy -- project --attach-domain"
          exit 1
